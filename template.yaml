AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: General-purpose logging API — forwards events to CloudWatch and Slack

Parameters:
  SlackWebhookUrl:
    Type: String
    NoEcho: true
    Description: Default Slack incoming webhook (used when no per-source route matches)
  SlackWebhookRoutesParameterName:
    Type: String
    Default: '/mega-demo-logging/slack-webhook-routes'
    Description: >
      Name of the SSM Parameter Store parameter holding the routes map (a JSON
      object mapping source/channel name → Slack webhook URL, or → array of
      webhook URLs). Not managed by this template — create/update its value
      directly with `aws ssm put-parameter`, which takes effect without a
      redeploy. See README "Targets and routing" for the update command.
  ApiKeyValue:
    Type: String
    NoEcho: true
    Description: Secret key callers must supply in the X-Api-Key header

Globals:
  Function:
    Runtime: nodejs22.x
    Timeout: 10
    MemorySize: 128
    Architectures: [arm64]

Resources:

  LoggingFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: mega-demo-logger
      Handler: src/handler.handler
      Environment:
        Variables:
          SLACK_WEBHOOK_URL: !Ref SlackWebhookUrl
          SLACK_WEBHOOK_ROUTES_PARAMETER_NAME: !Ref SlackWebhookRoutesParameterName
          API_KEY: !Ref ApiKeyValue
      Policies:
        - Statement:
            - Effect: Allow
              Action: ssm:GetParameter
              Resource: !Sub 'arn:aws:ssm:${AWS::Region}:${AWS::AccountId}:parameter${SlackWebhookRoutesParameterName}'
      Events:
        Post:
          Type: Api
          Properties:
            RestApiId: !Ref LoggingApi
            Path: /log
            Method: POST
            RequestModel:
              Model: LogEvent
              Required: true
              ValidateBody: true

  LoggingApi:
    Type: AWS::Serverless::Api
    Properties:
      Name: mega-demo-logging-api
      StageName: prod
      Cors:
        AllowMethods: "'POST,OPTIONS'"
        AllowHeaders: "'Content-Type,X-Api-Key'"
        AllowOrigin: "'*'"
      Models:
        LogEvent:
          type: object
          additionalProperties: false
          properties:
            source:
              type: string
              minLength: 1
              maxLength: 128
            level:
              type: string
              enum: [error, warn, info, success, notify]
            message:
              type: string
              maxLength: 4000
            timestamp:
              type: string
              format: date-time
            detail:
              oneOf:
                - type: string
                - type: object
            targets:
              type: array
              maxItems: 16
              items:
                type: object
                required: [type]
                properties:
                  type:
                    type: string
                    enum: [slack]
                  channel:
                    type: string
                    minLength: 1
                    maxLength: 128

  # CloudWatch log group with 90-day retention
  LogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !Sub '/aws/lambda/${LoggingFunction}'
      RetentionInDays: 90

Outputs:
  ApiEndpoint:
    Description: POST to this URL to log an event
    Value: !Sub 'https://${LoggingApi}.execute-api.${AWS::Region}.amazonaws.com/prod/log'
